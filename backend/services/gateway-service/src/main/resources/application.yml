server:
  port: ${GATEWAY_PORT:8084}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      default-filters:
        - RemoveResponseHeader=Access-Control-Allow-Origin
        - DedupeResponseHeader=Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:5173"
              - "http://localhost:4173"
              - "${FRONTEND_ORIGIN:https://*.sslip.io}"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      timeout: 2000ms

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

gateway:
  rate-limit:
    replenish-rate: 10
    burst-capacity: 20

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true
  health:
    redis:
      enabled: true
