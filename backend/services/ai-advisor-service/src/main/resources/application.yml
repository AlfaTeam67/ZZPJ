server:
  port: 8083

spring:
  application:
    name: ai-advisor-service
  config:
    import: "optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}"
  cloud:
    config:
      fail-fast: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:advisor}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:user}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:password}}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/fin-insight}}
          secondary-issuer-uri: ${JWT_SECONDARY_ISSUER_URI:${KEYCLOAK_SECONDARY_ISSUER_URI:http://localhost:8080/realms/fin-insight}}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:${EUREKA_URL:http://localhost:8761/eureka/}}

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Application-specific tuning. Wartości można nadpisać w ZZPJ-config/ai-advisor-service.yml.
app:
  openrouter:
    base-url: https://openrouter.ai/api/v1
    api-key: ${OPENROUTER_API_KEY:}
    referer: https://fin-insight.dev
    app-title: Fin-Insight
    temperature: 0.4
    max-tokens: 800
  finnhub:
    base-url: https://finnhub.io/api/v1
    api-key: ${FINNHUB_API_KEY:}
  newsapi:
    base-url: https://newsapi.org/v2
    api-key: ${NEWSAPI_KEY:}
  news:
    lookback-days: 7
    per-symbol-limit: 5
  scheduler:
    news-cleanup:
      cron: "0 0 3 * * *"
