services:
  eureka-server:
    build:
      context: .
      dockerfile: services/eureka-server/Dockerfile
    container_name: eureka-server
    ports:
      - "${SERVER_PORT_EUREKA}:8761"
    environment:
      - SERVICE_NAME=eureka-server
      - SERVER_PORT=8761
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health 2>/dev/null | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  config-server:
    build:
      context: .
      dockerfile: services/config-server/Dockerfile
    container_name: config-server
    ports:
      - "${SERVER_PORT_CONFIG}:8888"
    environment:
      - SERVICE_NAME=config-server
      - SERVER_PORT=8888
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health 2>/dev/null | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  portfolio-manager:
    build:
      context: .
      dockerfile: services/portfolio-manager/Dockerfile
    container_name: portfolio-manager
    ports:
      - "${SERVER_PORT_PORTFOLIO}:8081"
    environment:
      - SERVICE_NAME=portfolio-manager
      - SERVER_PORT=8081
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health 2>/dev/null | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  market-data-service:
    build:
      context: .
      dockerfile: services/market-data-service/Dockerfile
    container_name: market-data-service
    ports:
      - "${SERVER_PORT_MARKET}:8082"
    environment:
      - SERVICE_NAME=market-data-service
      - SERVER_PORT=8082
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health 2>/dev/null | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  ai-advisor-service:
    build:
      context: .
      dockerfile: services/ai-advisor-service/Dockerfile
    container_name: ai-advisor-service
    ports:
      - "${SERVER_PORT_AI}:8083"
    environment:
      - SERVICE_NAME=ai-advisor-service
      - SERVER_PORT=8083
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health 2>/dev/null | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command: start-dev --health-enabled=true
    ports:
      - "${SERVER_PORT_KEYCLOAK}:8080"
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KC_BOOTSTRAP_ADMIN_USERNAME}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KC_BOOTSTRAP_ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
