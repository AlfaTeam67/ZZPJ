services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: fin-insight-frontend
    ports:
      - '4173:4173'
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4173']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
